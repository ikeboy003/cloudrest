# RUNTIME: Cloudflare Worker entry configuration.
#
# This file is intentionally minimal during the rewrite. Bindings
# (Hyperdrive, KV, Durable Objects) are added in the stage that first
# consumes them, not speculatively. See ARCHITECTURE.md for stage order.

name = "cloudrest"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Hyperdrive binding — production uses a real Hyperdrive config;
# `wrangler dev` honors `localConnectionString` and connects
# directly. The id is a placeholder for local dev.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "00000000000000000000000000000000"
localConnectionString = "postgres://postgres:testpass@localhost:5433/cloudrest_example"

# Database config — maps to DatabaseConfig in config/schema.ts.
[vars]
DB_SCHEMAS = "public"
DB_ANON_ROLE = "anon"
DB_JWT_DEFAULT_ROLE = "authenticated"
DB_MAX_ROWS = "1000"
DB_STATEMENT_TIMEOUT_MS = "5000"
SCHEMA_REFRESH_INTERVAL = "60"
CORS_ALLOWED_ORIGINS = "*"
# Test-only JWT secret — do NOT use in production. Matches the
# default in `examples/curl/auth.sh` so the example scripts work
# out of the box against `wrangler dev`.
JWT_SECRET = "cloudrest-example-local-secret-32chars!"
JWT_ROLE_CLAIM = ".role"
