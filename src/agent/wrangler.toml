# CloudREST Data Agent — a conversational agent for your Postgres data.
#
# Deploy separately from the main CloudREST worker:
#   cd src/agent && npx wrangler deploy

name = "cloudrest-agent"
main = "index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Durable Object binding — the Agent SDK requires this.
[[durable_objects.bindings]]
name = "DataAgent"
class_name = "DataAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DataAgent"]

# Same Hyperdrive as the main CloudREST worker — shares the
# connection pool to Postgres.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "00000000000000000000000000000000"
localConnectionString = "postgres://postgres:testpass@localhost:5433/cloudrest_example"

[ai]
binding = "AI"

[vars]
DB_SCHEMAS = "public"
# Default model — override in dashboard or wrangler.toml.
AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
