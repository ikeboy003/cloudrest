name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # RUNTIME: Node 18 is excluded — vitest 4.x requires Node
        # 20+ (uses `styleText` from `node:util`), and the Workers
        # runtime itself targets Node 20+. Node 18 reached EOL in
        # April 2025.
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # RUNTIME: Node 18 is excluded — vitest 4.x requires Node
        # 20+ (uses `styleText` from `node:util`), and the Workers
        # runtime itself targets Node 20+. Node 18 reached EOL in
        # April 2025.
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  lint-docs:
    name: Lint markdown + links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            --exclude '^https://github\.com/ikeboy003/cloudrest'
            --exclude '^https://cloudrest\.'
            './**/*.md'
          fail: true
        continue-on-error: true
